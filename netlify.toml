[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect all requests through Next.js
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/___netlify-handler"
  status = 200

[dev]
  command    = "npm run dev"
  framework  = "#custom"
  targetPort = 3000
  port       = 8888
  publish    = ".next"
  autoLaunch = false
